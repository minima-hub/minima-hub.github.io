<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minima Hub</title>
  <meta name="description" content="Community-curated directory for Minima nodes, dApps, and libraries." />
  <meta property="og:title" content="Minima Hub" />
  <meta property="og:description" content="Community-curated directory for Minima nodes, dApps, and libraries." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      --bg: #070d09;
      --surface: #0d1a10;
      --surface2: #111f14;
      --text: #e8f5ee;
      --muted: rgba(232, 245, 238, 0.62);
      --line: rgba(26, 232, 123, 0.13);
      --accent: #1ae87b;
      --accent-soft: rgba(26, 232, 123, 0.10);
      --accent-border: rgba(26, 232, 123, 0.22);
      --max: 1100px;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    .wrap { width: min(var(--max), calc(100% - 40px)); margin: 0 auto; }

    /* ---- HEADER ---- */

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 13, 9, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 13px 0;
      gap: 16px;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-inner .btn-submit {
      justify-self: end;
    }

    .nav-icon {
      display: flex;
      align-items: center;
      color: var(--muted);
      transition: color 0.18s;
      flex-shrink: 0;
    }

    .nav-icon:hover { color: var(--accent); }
    .nav-icon svg { width: 20px; height: 20px; }

    .site-name {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 9px;
      white-space: nowrap;
    }

    .site-logo {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: 6px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    nav a {
      font-size: 0.88rem;
      color: var(--muted);
      transition: color 0.18s;
      font-weight: 500;
    }

    nav a:hover { color: var(--text); }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      padding: 7px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      font-size: 0.84rem;
      font-weight: 600;
      transition: background 0.18s, border-color 0.18s;
      white-space: nowrap;
    }

    .btn-submit:hover {
      background: rgba(26, 232, 123, 0.18);
      border-color: rgba(26, 232, 123, 0.4);
    }

    /* ---- SECTIONS ---- */

    section {
      padding: 40px 0;
      border-bottom: 1px solid var(--line);
      scroll-margin-top: 64px;
    }

    section:last-of-type { border-bottom: none; }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ---- RESOURCE GROUPS ---- */

    .resource-groups {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 28px 32px;
    }

    .rgroup-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .rgroup-note {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .rgroup-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .rgroup-list li {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .rgroup-list a {
      font-size: 0.88rem;
      color: var(--text);
      transition: color 0.18s;
      overflow-wrap: break-word;
      word-break: break-word;
      min-width: 0;
    }

    .rgroup-list a:hover { color: var(--accent); }

    .r-note {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .r-copy {
      font-size: 0.84rem;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      color: var(--text);
      cursor: pointer;
      transition: color 0.18s;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
      overflow-wrap: break-word;
      word-break: break-all;
      min-width: 0;
    }

    .r-copy:hover { color: var(--accent); }

    .r-copy.copied { color: var(--accent); }

    /* ---- dAPPS ---- */

    .dapps-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .cat-tabs {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      flex: 1;
    }

    .cat-tab {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }

    .cat-tab:hover { border-color: var(--accent-border); color: var(--text); }

    .cat-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #050e07;
      font-weight: 700;
    }

    .tag-row {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap;
      margin-bottom: 10px;
      padding-bottom: 2px;
    }
    .tag-row::-webkit-scrollbar { display: none; }

    .tag-filter-btn {
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tag-filter-btn:hover { border-color: var(--accent-border); color: var(--text); }
    .tag-filter-btn.active {
      background: rgba(26, 232, 123, 0.15);
      border-color: var(--accent-border);
      color: var(--accent);
      font-weight: 600;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      transition: border-color 0.18s;
      flex-shrink: 0;
    }

    .search-box:focus-within { border-color: var(--accent-border); }

    .search-box svg {
      width: 14px;
      height: 14px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.84rem;
      font-family: inherit;
      width: 160px;
    }

    .search-box input::placeholder { color: var(--muted); }

    .dapps-count {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 14px 0 16px;
    }

    .dapps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }

    .dapp-card {
      display: flex;
      flex-direction: column;
      padding: 18px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
    }

    .dapp-card:hover {
      border-color: var(--accent-border);
      background: var(--surface2);
      transform: translateY(-2px);
    }

    .dapp-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .dapp-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .dapp-badges {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .badge-official {
      background: rgba(26, 232, 123, 0.12);
      border: 1px solid rgba(26, 232, 123, 0.28);
      color: var(--accent);
    }

    .badge-beta {
      background: rgba(255, 195, 50, 0.12);
      border: 1px solid rgba(255, 195, 50, 0.28);
      color: #ffc332;
    }

    .badge-experimental {
      background: rgba(160, 130, 255, 0.12);
      border: 1px solid rgba(160, 130, 255, 0.28);
      color: #a082ff;
    }

    .badge-archived {
      background: rgba(180, 180, 180, 0.12);
      border: 1px solid rgba(180, 180, 180, 0.28);
      color: #888;
    }

    .badge-legacy {
      background: rgba(150, 120, 80, 0.12);
      border: 1px solid rgba(150, 120, 80, 0.28);
      color: #9a7a50;
    }

    .legacy-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .legacy-toggle-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      user-select: none;
      cursor: pointer;
    }

    .legacy-toggle {
      position: relative;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.22s;
      flex-shrink: 0;
    }

    .legacy-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.22s;
    }

    .legacy-toggle.active {
      background: #9a7a50;
    }

    .legacy-toggle.active::after {
      transform: translateX(18px);
    }

    .dapp-category {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .dapp-desc {
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 14px;
    }

    .dapp-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tag {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.07);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .tag:hover { border-color: rgba(26, 232, 123, 0.25); color: var(--text); }
    .tag.active-tag {
      background: rgba(26, 232, 123, 0.1);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .dapp-links {
      display: flex;
      gap: 8px;
    }

    .dapp-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--text);
      transition: all 0.18s;
    }

    .dapp-link:hover { border-color: var(--accent-border); color: var(--accent); }

    .dapp-link.primary {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .dapp-link.primary:hover { background: rgba(26, 232, 123, 0.18); }
    .dapp-link svg { width: 12px; height: 12px; }
    .dapp-social { padding: 5px 8px; }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* ---- LIBRARIES ---- */

    /* ---- FOOTER ---- */

    footer {
      padding: 24px 0;
      border-top: 1px solid var(--line);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.88rem;
    }

    .footer-brand .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .footer-note {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .footer-links {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 0.8rem;
      color: var(--muted);
      transition: color 0.18s;
    }

    .footer-links a:hover { color: var(--text); }

    /* ---- LOADING ---- */

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- RESPONSIVE ---- */

    @media (max-width: 860px) {
      nav { display: none; }
      .dapps-controls { flex-direction: column; align-items: flex-start; }
      .search-box input { width: 140px; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
    }

    @media (max-width: 700px) {
      .resource-groups { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px 24px; }
    }

    @media (max-width: 520px) {
      .nav-inner { gap: 8px; }
      .btn-submit { padding: 6px 12px; font-size: 0.78rem; }
      .resource-groups { grid-template-columns: 1fr 1fr; gap: 20px 16px; }
      .dapps-grid { grid-template-columns: 1fr; }
      .cat-row { gap: 8px; }
      section { padding: 28px 0; }
    }

    @media (max-width: 380px) {
      .resource-groups { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap nav-inner">
      <a href="#" class="site-name">
        <img src="favicon.svg" class="site-logo" alt="" />
        Minima Hub
      </a>
      <div class="nav-center">
        <nav>
          <a href="#resources">Resources</a>
          <a href="#dapps">dApps</a>
        </nav>
        <a href="https://t.me/theminimahub" target="_blank" rel="noopener" class="nav-icon" title="Telegram">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.328-.373-.115l-6.869 4.332-2.97-.924c-.643-.204-.657-.643.136-.953l11.6-4.47c.537-.194 1.006.128.832.941z"/></svg>
        </a>
      </div>
      <a href="https://github.com/minima-hub/minima-hub.github.io" target="_blank" rel="noopener" class="btn-submit">
        + Submit
      </a>
    </div>
  </header>

  <section id="resources">
    <div class="wrap">
      <div class="section-head">
        <span class="section-label">Resources</span>
      </div>
      <div id="resource-groups" class="resource-groups">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <section id="dapps">
    <div class="wrap">
      <div class="section-head">
        <span class="section-label">dApps</span>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" id="search-input" placeholder="Search..." aria-label="Search dApps" />
        </div>
      </div>
      <div class="cat-row">
        <div class="cat-tabs" id="cat-tabs">
          <button class="cat-tab active" data-cat="all">All</button>
          <button class="cat-tab" data-cat="Finance">Finance</button>
          <button class="cat-tab" data-cat="Tools">Tools</button>
          <button class="cat-tab" data-cat="Communication">Communication</button>
          <button class="cat-tab" data-cat="Infrastructure">Infrastructure</button>
          <button class="cat-tab" data-cat="Developer">Developer</button>
          <button class="cat-tab" data-cat="Bridge">Bridge</button>
          <button class="cat-tab" data-cat="NFT">NFT</button>
          <button class="cat-tab" data-cat="Gaming">Gaming</button>
        </div>
        <div class="legacy-toggle-wrap">
          <button id="legacy-toggle" class="legacy-toggle" aria-label="Show legacy dApps"></button>
          <span class="legacy-toggle-label" id="legacy-toggle-label">Show legacy</span>
        </div>
      </div>
      <div class="tag-row" id="tag-row"></div>
      <div class="dapps-count" id="dapps-count"></div>
      <div id="dapps-grid" class="dapps-grid">
        <div class="loading-state"><div class="spinner"></div><span>Loading...</span></div>
      </div>
    </div>
  </section>

  <footer>
    <div class="wrap footer-inner">
      <div>
        <div class="footer-brand"><span class="dot"></span> Minima Hub</div>
        <div class="footer-note">Open source, community maintained. Not affiliated with Minima Global.</div>
      </div>
      <div class="footer-links">
        <a href="https://t.me/theminimahub" target="_blank" rel="noopener">Telegram</a>
        <a href="https://github.com/minima-hub/minima-hub.github.io" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    let allDapps = [];
    let currentCategory = 'all';
    let currentTag = '';
    let searchQuery = '';
    let showLegacy = false;

    function renderResources(data) {
      const container = document.getElementById('resource-groups');
      if (!data.groups || !data.groups.length) { container.innerHTML = ''; return; }
      container.innerHTML = data.groups.map(group => {
        const items = group.items.map(item => {
          if (group.copyable || !item.url) {
            const copyValue = item.url || item.name;
            const note = item.note ? `<span class="r-note">${item.note}</span>` : '';
            return `<li><button class="r-copy" data-copy="${copyValue}" title="Click to copy">${item.name}</button>${note}</li>`;
          }
          const note = item.note ? `<span class="r-note">${item.note}</span>` : '';
          return `<li><a href="${item.url}" target="_blank" rel="noopener">${item.name}</a>${note}</li>`;
        }).join('');
        const note = group.note ? `<div class="rgroup-note">${group.note}</div>` : '';
        return `<div><div class="rgroup-label">${group.label}</div>${note}<ul class="rgroup-list">${items}</ul></div>`;
      }).join('');

      container.querySelectorAll('.r-copy').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.dataset.copy).then(() => {
            const orig = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
          });
        });
      });
    }

    function statusBadge(status) {
      if (status === 'active') return '';
      const cls = { beta: 'badge-beta', experimental: 'badge-experimental', archived: 'badge-archived', legacy: 'badge-legacy' }[status] || '';
      return `<span class="badge ${cls}">${status}</span>`;
    }

    function renderDapps(list) {
      const grid = document.getElementById('dapps-grid');
      const count = document.getElementById('dapps-count');
      if (!list.length) {
        grid.innerHTML = '<div class="empty-state">No dApps match your filter.</div>';
        count.textContent = '';
        return;
      }
      count.textContent = `${list.length} dApp${list.length === 1 ? '' : 's'}`;
      grid.innerHTML = list.map(d => `
        <div class="dapp-card">
          <div class="dapp-card-top">
            <div class="dapp-name">${d.name}</div>
            <div class="dapp-badges">
              ${d.official ? '<span class="badge badge-official">Official</span>' : ''}
              ${statusBadge(d.status)}
            </div>
          </div>
          <div class="dapp-category">${d.category}</div>
          <div class="dapp-desc">${d.description}</div>
          ${d.tags && d.tags.length ? `<div class="dapp-tags">${d.tags.map(t => `<span class="tag${t === currentTag ? ' active-tag' : ''}" data-tag="${t}">${t}</span>`).join('')}</div>` : ''}
          <div class="dapp-links">
            ${d.url ? `<a href="${d.url}" target="_blank" rel="noopener" class="dapp-link primary">${icons.link} Open</a>` : ''}
            ${d.github ? `<a href="${d.github}" target="_blank" rel="noopener" class="dapp-link">${icons.github} GitHub</a>` : ''}
            ${d.x ? `<a href="${d.x}" target="_blank" rel="noopener" class="dapp-link dapp-social" title="X / Twitter">${icons.x}</a>` : ''}
            ${d.telegram ? `<a href="${d.telegram}" target="_blank" rel="noopener" class="dapp-link dapp-social" title="Telegram">${icons.telegram}</a>` : ''}
            ${d.discord ? `<a href="${d.discord}" target="_blank" rel="noopener" class="dapp-link dapp-social" title="Discord">${icons.discord}</a>` : ''}
          </div>
        </div>`).join('');
    }

    function filterDapps() {
      const q = searchQuery.toLowerCase();
      renderDapps(allDapps.filter(d => {
        if (!showLegacy && d.status === 'legacy') return false;
        const catMatch = currentCategory === 'all' || d.category === currentCategory;
        const tagMatch = !currentTag || (d.tags && d.tags.includes(currentTag));
        const searchMatch = !q || d.name.toLowerCase().includes(q) || d.description.toLowerCase().includes(q) || (d.tags && d.tags.some(t => t.toLowerCase().includes(q)));
        return catMatch && tagMatch && searchMatch;
      }));
    }

    async function loadData() {
      try {
        let dapps, resources;
        if (window.__MINIMA_DATA__) {
          dapps = window.__MINIMA_DATA__.dapps;
          resources = window.__MINIMA_DATA__.resources;
        } else {
          const [dappsRes, resourcesRes] = await Promise.all([
            fetch('data/dapps.json'),
            fetch('data/resources.json')
          ]);
          dapps = await dappsRes.json();
          resources = await resourcesRes.json();
        }
        allDapps = dapps;
        buildTagRow();
        renderResources(resources);
        filterDapps();
      } catch (err) {
        document.getElementById('dapps-grid').innerHTML = '<div class="empty-state">Could not load data.</div>';
        document.getElementById('resource-groups').innerHTML = '<div class="empty-state">Could not load resource data.</div>';
      }
    }

    document.getElementById('cat-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.cat-tab');
      if (!tab) return;
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCategory = tab.dataset.cat;
      filterDapps();
    });

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      filterDapps();
    });

    function toggleLegacy() {
      showLegacy = !showLegacy;
      document.getElementById('legacy-toggle').classList.toggle('active', showLegacy);
      document.getElementById('legacy-toggle-label').textContent = showLegacy ? 'Hide legacy' : 'Show legacy';
      filterDapps();
    }
    document.getElementById('legacy-toggle').addEventListener('click', toggleLegacy);
    document.getElementById('legacy-toggle-label').addEventListener('click', toggleLegacy);

    function buildTagRow() {
      const counts = {};
      allDapps.forEach(d => {
        if (d.tags) d.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; });
      });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
      document.getElementById('tag-row').innerHTML = sorted.map(([tag]) =>
        `<button class="tag-filter-btn" data-tag="${tag}">${tag}</button>`
      ).join('');
    }

    function updateTagRow() {
      document.querySelectorAll('#tag-row .tag-filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tag === currentTag);
      });
    }

    document.getElementById('tag-row').addEventListener('click', e => {
      const btn = e.target.closest('.tag-filter-btn');
      if (!btn) return;
      currentTag = currentTag === btn.dataset.tag ? '' : btn.dataset.tag;
      updateTagRow();
      filterDapps();
    });

    document.getElementById('dapps-grid').addEventListener('click', e => {
      const el = e.target.closest('.tag');
      if (!el || !el.dataset.tag) return;
      currentTag = currentTag === el.dataset.tag ? '' : el.dataset.tag;
      updateTagRow();
      filterDapps();
    });

    loadData();
  </script>
